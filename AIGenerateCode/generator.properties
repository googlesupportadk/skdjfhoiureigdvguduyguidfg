# 代码生成器配置文件

# ========== 基本配置 ==========
# 项目根路径
project.root=E:/D/D/Android_Data/C_LoaderApk/AIGenerateCode

# 包名
package.name=com.example.app

# 应用名
app.name=My App

# ========== 生成配置 ==========
# 包数量
package.count=10

# 每个包的Activity数量
activity.count.per.package=10

# Model数量
model.count=15

# ViewModel数量
viewmodel.count=10

# Repository数量
repository.count=5

# Adapter数量
adapter.count=10

# Fragment数量
fragment.count=5

# Manager数量
manager.count=8

# Helper数量
helper.count=8

# ========== 资源配置 ==========
# Drawable数量范围
drawable.min=5
drawable.max=30

# Layout数量范围
layout.min=5
layout.max=30

# String数量范围
string.min=2
string.max=30

# Raw数量范围
raw.min=3
raw.max=15

# ========== 日志配置 ==========
# 是否启用控制台输出
log.console.enabled=true

# 是否启用文件输出
log.file.enabled=true

# ========== 错误处理配置 ==========
# 是否启用严格模式（遇到错误立即停止）
error.strict.mode=false
